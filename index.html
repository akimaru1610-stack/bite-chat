<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合言葉チャット</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; line-height: 1.6; }
        .box { border: 1px solid #333; padding: 10px; margin: 10px 0; min-height: 50px; background: #050505; }
        input { width: 100%; background: #111; color: #fff; border: 1px solid #555; padding: 10px; box-sizing: border-box; margin: 5px 0; }
        button { background: #222; color: #0f0; border: 1px solid #0f0; padding: 10px 20px; cursor: pointer; }
        button:disabled { border-color: #333; color: #333; }
        .status { font-size: 0.8rem; color: #f0f; }
        hr { border: 0; border-top: 1px solid #333; margin: 20px 0; }
    </style>
</head>
<body>
    <h3>🔑 合言葉でつなぐ</h3>
    
    <div id="setup-area">
        <input id="secretWord" placeholder="例: himitsu-1234 (共通の合言葉)">
        <div style="display: flex; gap: 10px;">
            <button onclick="startSession()">この言葉で待機</button>
            <button onclick="connectSession()">相手に接続</button>
        </div>
    </div>

    <div id="active-area" style="display:none;">
        <button onclick="exitSession()" style="border-color: #f00; color: #f00;">合言葉を破棄して終了</button>
    </div>

    <p class="status" id="status">合言葉を決めてください</p>

    <hr>
    <p>相手の入力:</p>
    <div id="remoteText" class="box"></div>

    <p>あなたの入力:</p>
    <input id="localInput" placeholder="接続すると入力できます" disabled>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script>
        let peer = null;
        let conn = null;

        const statusEl = document.getElementById('status');
        const localInput = document.getElementById('localInput');
        const setupArea = document.getElementById('setup-area');
        const activeArea = document.getElementById('active-area');

        // 1. この合言葉で待機する（ホスト）
        function startSession() {
            const word = document.getElementById('secretWord').value;
            if(!word) return alert("合言葉を入れてね");
            
            initPeer(word);
            statusEl.innerText = "待機中... 相手に合言葉を伝えてください";
        }

        // 2. 相手の合言葉に繋ぎにいく（クライアント）
        function connectSession() {
            const word = document.getElementById('secretWord').value;
            if(!word) return alert("合言葉を入れてね");

            initPeer(null); // 自分はランダムIDで起動
            peer.on('open', () => {
                statusEl.innerText = "接続中...";
                setupConn(peer.connect(word));
            });
        }

        function initPeer(id) {
            if(peer) peer.destroy();
            peer = id ? new Peer(id) : new Peer();
            
            peer.on('connection', (c) => setupConn(c));
            peer.on('error', (err) => {
                statusEl.innerText = "エラー: " + err.type;
                if(err.type === 'id-taken-error') statusEl.innerText = "その合言葉は既に使用中ですよ";
            });
        }

        function setupConn(c) {
            conn = c;
            conn.on('open', () => {
                statusEl.innerText = "同期完了！";
                localInput.disabled = false;
                setupArea.style.display = "none";
                activeArea.style.display = "block";
            });
            conn.on('data', (data) => {
                document.getElementById('remoteText').innerText = data;
            });
            conn.on('close', () => {
                alert("接続が切れました");
                location.reload();
            });
        }

        // 入力同期
        localInput.addEventListener('input', (e) => {
            if (conn && conn.open) conn.send(e.target.value);
        });

        // 破棄
        function exitSession() {
            if(confirm("通信を終了して合言葉を解放しますか？")) {
                location.reload();
            }
        }
    </script>
</body>
</html>
